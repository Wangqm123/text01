<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>半山客·侨乡心语 | 轻问答</title>
  <link rel="stylesheet" href="quit.css">
</head>
<body>
<div class="quiz-container" id="quizContainer">
  <div class="cooldown-bar" id="cooldownBar">⏳ 冷却中，请稍后 ...</div>
  <div class="hero">
    <h1>🌾 潮蕴客声 <span>半山客 · 侨乡心</span></h1>
    <p>客家·潮汕·华侨</p>
  </div>

  <div class="quiz-body" id="quizApp">
    <div class="step-progress" id="progressBar">
      <div class="step" data-step="1">选择</div>
      <div class="step" data-step="2">判断</div>
      <div class="step" data-step="3">主观</div>
    </div>

    <!-- 选择题面板 -->
    <div id="stepChoicePanel">
      <div class="question-card">
        <div id="choiceHint" class="multi-hint" style="display: none;">📌 多选题 · 可点选多个选项</div>
        <div class="question-text" id="choiceQuestionText"></div>
        <div class="options-area" id="choiceOptionsArea"></div>
        <button id="nextToJudgeBtn">下一题</button>
      </div>
    </div>

    <!-- 判断题面板 -->
    <div id="stepJudgePanel" class="hidden-step">
      <div class="question-card">
        <div class="question-text" id="judgeQuestionText"></div>
        <div class="judge-group" id="judgeOptionsArea">
          <div class="judge-opt" data-value="正确">✅ 正确</div>
          <div class="judge-opt" data-value="错误">❌ 错误</div>
        </div>
        <button id="nextToSubjectiveBtn">下一题 </button>
      </div>
    </div>

    <!-- 主观题面板 -->
    <div id="stepSubjectivePanel" class="hidden-step">
      <div class="question-card">
        <div class="question-text" id="subjectiveQuestionText"></div>
        <textarea id="subjectiveAnswer" rows="4" placeholder="写写你的思考、感悟或见解…… 侨乡文化因青年而鲜活 🌱"></textarea>
        <button id="submitQuizBtn">🍃 提交 </button>
      </div>
    </div>

    <!-- 结果面板 -->
    <div id="resultPanel" class="hidden-step">
      <div class="result-box">
        <div class="score-circle"><div class="score-number" id="finalScoreSpan"></div></div>
        <div id="resultDetails"></div>
        <button id="retakeBtn" class="btn-outline">🔄 再答一组 · 半山客新知</button>
      </div>
      <footer>源自潮汕·客家侨乡真实史料 </footer>
    </div>
  </div>
</div>

<script src="quit.js"></script>
</body>
</html>
